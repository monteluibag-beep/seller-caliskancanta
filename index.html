<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çalışkan Çanta — Giriş</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --or: #E85D04; --or-deep: #C44D00; --or-light: #FF7D2A; --font: 'Plus Jakarta Sans', sans-serif; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; background: #0F0A05; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
body::before { content: ''; position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(232,93,4,.15) 0%, transparent 70%); top: -200px; right: -200px; }
body::after { content: ''; position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,125,42,.08) 0%, transparent 70%); bottom: -100px; left: -100px; }
.login-box { width: 420px; position: relative; z-index: 1; }
.login-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 20px; padding: 40px; backdrop-filter: blur(20px); }
.login-logo { text-align: center; margin-bottom: 36px; }
.logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--or), var(--or-light)); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 30px; color: #fff; box-shadow: 0 8px 32px rgba(232,93,4,.5); }
.logo-name { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
.logo-sub { font-size: 12px; color: rgba(255,255,255,.35); margin-top: 4px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: rgba(255,255,255,.5); margin-bottom: 7px; text-transform: uppercase; letter-spacing: .5px; }
.form-input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.1); border-radius: 10px; font-size: 14px; color: #fff; }
.form-input:focus { outline: none; border-color: var(--or); background: rgba(255,255,255,.08); box-shadow: 0 0 0 3px rgba(232,93,4,.15); }
.login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--or), var(--or-light)); border: none; border-radius: 10px; font-size: 14px; font-weight: 700; color: #fff; cursor: pointer; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 16px rgba(232,93,4,.4); }
.login-btn:disabled { opacity: .6; cursor: not-allowed; }
.login-footer { text-align: center; font-size: 11px; color: rgba(255,255,255,.2); margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 5px; }
.error-msg { background: rgba(220,38,38,.15); border: 1px solid rgba(220,38,38,.3); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #FCA5A5; margin-bottom: 16px; display: none; align-items: center; gap: 7px; }
.error-msg.show { display: flex; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
